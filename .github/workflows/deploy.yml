name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers deployment whenever code is pushed to main

permissions:
  contents: read
  pages: write      # Grants permission to upload to GitHub Pages
  id-token: write   # Required for secure authentication

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup GitHub Pages configuration
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build static Next.js export
        run: npx next build

      - name: Upload static export artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Uploads the generated static folder

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

        